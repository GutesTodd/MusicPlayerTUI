name: Build and Release

on:
  push:
    tags:
      - 'v*' # Запуск при пуше тега, например v1.0.0
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Run Docker Build
        run: |
          docker build -t yandex-music-build -f build.Dockerfile .
          docker run --name builder yandex-music-build bash -c "
            uv sync --frozen && \
            export VERSION=${{ github.ref_name }} && \
            nfpm pkg --packager deb && \
            nfpm pkg --packager rpm
          "
          docker cp builder:/app/*.deb .
          docker cp builder:/app/*.rpm .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: irm https://astral.sh/uv/install.ps1 | iex

      - name: Download Embedded Python
        run: |
          $url = "https://www.python.org/ftp/python/3.12.3/python-3.12.3-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath dist/portable

      - name: Prepare Python Environment
        run: |
          cd dist/portable
          # Разрешаем импорт site-packages (важно для Embedded!)
          $pth = "python312._pth"
          (Get-Content $pth) | ForEach-Object { $_ -replace "#import site", "import site" } | Set-Content $pth
          # Создаем папку для зависимостей и добавляем её в пути
          New-Item -ItemType Directory -Path "site-packages"
          Add-Content $pth "site-packages"
          Add-Content $pth ".." # Добавляем корень для поиска наших модулей

      - name: Install Dependencies
        run: |
          uv pip install -r pyproject.toml --target dist/portable/site-packages

      - name: Copy Project Source
        run: |
          Copy-Item -Path "backend" -Destination "dist/portable/backend" -Recurse -Force
          Copy-Item -Path "ui" -Destination "dist/portable/ui" -Recurse -Force
          Copy-Item -Path "shared" -Destination "dist/portable/shared" -Recurse -Force
          Copy-Item -Path "launcher.py" -Destination "dist/portable/launcher.py" -Force

      - name: Create Launcher (BAT)
        run: |
          $content = @"
          @echo off
          cd /d %~dp0
          python.exe launcher.py
          "@
          $content | Set-Content -Path "dist/portable/start.bat" -Encoding Ascii

      - name: Create Zip Archive
        run: |
          Compress-Archive -Path dist/portable/* -DestinationPath yandex-music-cli-win64-portable.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: yandex-music-cli-win64-portable.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-packages/*.deb
            linux-packages/*.rpm
            windows-portable/yandex-music-cli-win64-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
